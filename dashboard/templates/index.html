<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kuromi — Attack Telemetry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080f;--surface:rgba(22,22,35,.75);--border:rgba(60,60,120,.2);--text:#e2e2f0;--dim:#6868a0;--accent:#ff2d95;--cyan:#38bdf8;--purple:#7c3aed;--green:#4ade80;--red:#f87171;--orange:#fb923c}
html{height:100%}
body{height:100%;overflow:hidden;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(255,45,149,.1),transparent 60%),var(--bg);color:var(--text);font-family:'Inter',sans-serif}
#three{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.ui{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:16px 24px;gap:12px;pointer-events:none}
.ui>*{pointer-events:auto}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.nav-l{display:flex;align-items:center;gap:14px}
.nav-m{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:#fff}
.nav-t{font-size:15px;font-weight:600}
.nav-t small{color:var(--dim);font-weight:400;font-size:13px}
.nav-r{display:flex;align-items:center;gap:12px}
.nav-st{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:8px;font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.12)}
.nav-d{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.nav-p{padding:4px 12px;border-radius:8px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim);background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.1)}
.main{flex:1;display:grid;grid-template-columns:1fr 320px;gap:12px;min-height:0}
.cl{display:flex;flex-direction:column;gap:12px}
.cr{display:flex;flex-direction:column;gap:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.st{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.st:hover{border-color:rgba(60,60,120,.4)}
.st-n{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;font-feature-settings:'tnum'1}
.st-l{font-size:11px;color:var(--dim);margin-top:3px}
.c0{color:var(--cyan)}.c1{color:var(--red)}.c2{color:var(--orange)}.c3{color:var(--accent)}.c4{color:var(--purple)}.c5{color:var(--green)}
.cp{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;flex:1;display:flex;flex-direction:column;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.cp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cp-h h3{font-size:12px;font-weight:600;color:var(--dim);letter-spacing:.4px;text-transform:uppercase}
.cp-b{flex:1;position:relative;min-height:0}
.cp-b canvas{width:100%!important;height:100%!important}
.pn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;flex:1;display:flex;flex-direction:column;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.pn:last-child{flex:0.7}
.pn h3{font-size:10px;font-weight:600;color:var(--dim);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px}
.ps{flex:1;overflow-y:auto;min-height:0}
.ps::-webkit-scrollbar{width:3px}
.ps::-webkit-scrollbar-thumb{background:rgba(104,104,160,.2);border-radius:2px}
table{width:100%;border-collapse:collapse}
th{font-size:9px;color:rgba(104,104,160,.4);font-weight:500;padding:4px 6px;text-align:left;font-family:'JetBrains Mono',monospace;position:sticky;top:0;background:var(--surface);border-bottom:1px solid rgba(60,60,120,.1)}
td{font-size:11px;padding:5px 6px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid rgba(60,60,120,.04)}
tr:hover td{background:rgba(60,60,120,.06)}
.ti{color:rgba(104,104,160,.4);font-size:9px;width:20px}
.tv{color:var(--cyan)}
.tn{text-align:right;font-weight:600}
.tb{display:inline-block;height:3px;border-radius:2px;margin-left:6px;vertical-align:middle}
@media(max-width:900px){.main{grid-template-columns:1fr}}
@media(max-width:600px){.ui{padding:10px;gap:8px}.nav{flex-direction:column;gap:8px}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="three"></div>
<div class="ui">

<div class="nav">
  <div class="nav-l">
    <div class="nav-m">K</div>
    <div class="nav-t">Kuromi <small>/ Attack Telemetry</small></div>
  </div>
  <div class="nav-r">
    <div class="nav-st"><span class="nav-d"></span> Capturing</div>
    <div class="nav-p">SSH :2222</div>
  </div>
</div>

<div class="main">
  <div class="cl">
    <div class="stats" id="statsRow"></div>
    <div class="cp">
      <div class="cp-h"><h3>Attack Timeline</h3></div>
      <div class="cp-b"><canvas id="ct"></canvas></div>
    </div>
  </div>
  <div class="cr">
    <div class="pn"><h3>Attacker IPs</h3><div class="ps"><table><thead><tr><th></th><th>IP</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="t0"></tbody></table></div></div>
    <div class="pn"><h3>Usernames</h3><div class="ps"><table><thead><tr><th></th><th>User</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="t1"></tbody></table></div></div>
  </div>
</div>
</div>
<script>
(function() {
  var container = document.getElementById('three');
  if (!container) return;
  var W = container.clientWidth, H = container.clientHeight;

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
  camera.position.set(10, 6, 14);

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x08080f, 1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x222244, 0.5));
  var dl = new THREE.DirectionalLight(0x7c3aed, 1.2); dl.position.set(5, 10, 7); scene.add(dl);
  var dl2 = new THREE.DirectionalLight(0xff2d95, 0.4); dl2.position.set(-5, -3, -5); scene.add(dl2);
  var pl = new THREE.PointLight(0x38bdf8, 0.6, 30); pl.position.set(0, 3, 0); scene.add(pl);

  var grid = new THREE.GridHelper(30, 30, 0x7c3aed, 0x1a1a3a);
  grid.position.y = -1.5; scene.add(grid);

  var geo = new THREE.TorusKnotGeometry(1.8, 0.6, 128, 16);
  var mat = new THREE.MeshPhysicalMaterial({ color: 0xff2d95, metalness: 0.3, roughness: 0.2, emissive: 0xff2d95, emissiveIntensity: 0.08, transparent: true, opacity: 0.85 });
  var knot = new THREE.Mesh(geo, mat);
  knot.position.y = 0.8; scene.add(knot);

  var wm = new THREE.MeshPhysicalMaterial({ color: 0x38bdf8, wireframe: true, transparent: true, opacity: 0.15 });
  var wk = new THREE.Mesh(geo.clone(), wm);
  wk.position.copy(knot.position); wk.scale.set(1.02, 1.02, 1.02); scene.add(wk);

  var rings = [];
  for (var i = 0; i < 3; i++) {
    var rg = new THREE.TorusGeometry(2.8 + i * 0.6, 0.03, 16, 64);
    var rm = new THREE.MeshBasicMaterial({ color: [0x38bdf8, 0x7c3aed, 0xff2d95][i], transparent: true, opacity: 0.25 + i * 0.08 });
    var ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = Math.PI / 3 + i * 0.4; ring.rotation.z = i * 0.5;
    ring.position.y = 0.8; ring.userData = { speed: 0.2 + i * 0.1 };
    scene.add(ring); rings.push(ring);
  }

  var pc = 600, pos = new Float32Array(pc * 3), cols = new Float32Array(pc * 3);
  var palette = [new THREE.Color(0x38bdf8), new THREE.Color(0x7c3aed), new THREE.Color(0xff2d95)];
  for (var i = 0; i < pc; i++) {
    var r = 4 + Math.random() * 6, t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r * Math.sin(p) * Math.cos(t); pos[i*3+1] = (Math.random() - 0.5) * 6; pos[i*3+2] = r * Math.sin(p) * Math.sin(t);
    var c = palette[Math.floor(Math.random() * 3)];
    cols[i*3] = c.r; cols[i*3+1] = c.g; cols[i*3+2] = c.b;
  }
  var pg = new THREE.BufferGeometry();
  pg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  pg.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  var pm = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false });
  var pts = new THREE.Points(pg, pm); scene.add(pts);

  var mx = 0, my = 0;
  document.addEventListener('mousemove', function(e) {
    mx = (e.clientX / window.innerWidth) * 2 - 1;
    my = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  var t = 0;
  function anim() {
    requestAnimationFrame(anim);
    t += 0.01;
    knot.rotation.x += 0.005; knot.rotation.y += 0.008;
    wk.rotation.copy(knot.rotation);
    for (var i = 0; i < rings.length; i++) rings[i].rotation.y += rings[i].userData.speed * 0.01;
    var ppos = pts.geometry.attributes.position.array;
    for (var i = 0; i < pc; i++) ppos[i*3+1] += Math.sin(t * 0.5 + i * 0.1) * 0.002;
    pts.geometry.attributes.position.needsUpdate = true;
    camera.position.x += (mx * 2 - camera.position.x + 10) * 0.02;
    camera.position.z += (my * 1.5 - camera.position.z + 14) * 0.02;
    camera.lookAt(0, 0.5, 0);
    pl.intensity = 0.5 + Math.sin(t * 2) * 0.2;
    renderer.render(scene, camera);
  }
  anim();

  window.addEventListener('resize', function() {
    var w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
</script>
<script>
var D = [
  {id:'sessions',l:'Sessions',c:'c0'},{id:'auth_failed',l:'Failed',c:'c1'},{id:'auth_success',l:'Compromised',c:'c2'},{id:'commands',l:'Commands',c:'c3'},
  {id:'downloads',l:'Downloads',c:'c4'},{id:'unique_ips',l:'Attackers',c:'c5'},{id:'unique_usernames',l:'Usernames',c:'c0'},{id:'auth_rate',l:'Auth Rate',c:'c5',x:'%'}
];
var chartInstance = null;

function renderStats(stats) {
  var row = document.getElementById('statsRow');
  if (!row) return;
  row.innerHTML = D.map(function(m) {
    return '<div class="st"><div class="st-n ' + m.c + '">' + (stats[m.id] || 0) + (m.x || '') + '</div><div class="st-l">' + m.l + '</div></div>';
  }).join('');
}

function renderTimeline(timeline) {
  var canvas = document.getElementById('ct');
  if (!canvas || !timeline || !timeline.length) return;
  if (chartInstance) chartInstance.destroy();
  var parent = canvas.parentElement;
  canvas.width = parent.clientWidth * 2;
  canvas.height = parent.clientHeight * 2;
  canvas.style.width = parent.clientWidth + 'px';
  canvas.style.height = parent.clientHeight + 'px';
  var ctx = canvas.getContext('2d');
  var grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, 'rgba(56,189,248,0.18)');
  grad.addColorStop(1, 'rgba(56,189,248,0)');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: timeline.map(function(p) { return p.hour; }),
      datasets: [{
        data: timeline.map(function(p) { return p.count; }),
        borderColor: '#38bdf8', backgroundColor: grad, borderWidth: 1.5,
        pointRadius: 2, fill: true, tension: 0.35
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(22,22,35,.95)', titleFont: { family: 'JetBrains Mono', size: 11 }, bodyFont: { family: 'JetBrains Mono', size: 11 }, borderColor: 'rgba(56,189,248,.2)', borderWidth: 1, padding: 8 } },
      scales: {
        y: { beginAtZero: true, grid: { color: 'rgba(60,60,120,.15)' }, ticks: { color: '#6868a0', font: { size: 9 } } },
        x: { grid: { display: false }, ticks: { color: '#6868a0', font: { size: 8 } } }
      }
    }
  });
}

function fillTable(tbodyId, items, labelKey, countKey, color) {
  var tb = document.getElementById(tbodyId);
  if (!tb) return;
  var maxC = items.length ? Math.max.apply(null, items.map(function(i) { return i[countKey]; })) : 1;
  tb.innerHTML = items.map(function(x, i) {
    var pct = (x[countKey] / maxC) * 100;
    return '<tr><td class="ti">' + String(i + 1).padStart(2, '0') + '</td><td class="tv">' + x[labelKey] + '</td><td class="tn">' + x[countKey] + '<span class="tb" style="width:' + Math.min(pct, 60) + 'px;background:' + color + '"></span></td></tr>';
  }).join('');
}

function refresh() {
  fetch('/api/stats')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) return;
      renderStats(d.stats);
      renderTimeline(d.timeline);
      fillTable('t0', d.top_ips || [], 'ip', 'count', '#7c3aed');
      fillTable('t1', d.top_usernames || [], 'username', 'count', '#ff2d95');
    })
    .catch(function(e) { console.error(e); });
}

refresh();
setInterval(refresh, 5000);

var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    var canvas = document.getElementById('ct');
    if (canvas && chartInstance) { chartInstance.resize(); }
  }, 500);
});
</script>
</body>
</html>
