<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kuromi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
:root{--bg:#0b0b12;--bg2:#111118;--card:#16161f;--bd:#1e1e2e;--bd2:#2a2a3e;--txt:#e2e2f0;--dim:#7878a0;--dim2:#484868;--pink:#ff2d95;--purple:#7c3aed;--cyan:#38bdf8;--green:#4ade80;--red:#f87171;--orange:#fb923c}
body{background:var(--bg);color:var(--txt)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:2px}
.nav{display:flex;justify-content:space-between;align-items:center;padding:0 32px;height:56px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.nav-l{display:flex;align-items:center;gap:12px}
.nav-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:#fff}
.nav-t{font-size:15px;font-weight:600;color:var(--txt)}
.nav-t span{color:var(--dim);font-weight:400}
.nav-r{display:flex;align-items:center;gap:16px}
.nav-b{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;background:rgba(74,222,128,0.08);color:var(--green);border:1px solid rgba(74,222,128,0.12)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.nav-p{padding:4px 10px;border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim);background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.1)}
.app{padding:24px 32px 0;max-width:1440px;margin:0 auto;height:calc(100vh - 56px);display:flex;flex-direction:column;gap:16px}
.stats{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px 12px;transition:all .12s}
.stat:hover{border-color:var(--bd2);background:var(--bg2)}
.sn{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px;line-height:1.2;font-feature-settings:'tnum'1}
.s1{color:var(--cyan)}.s2{color:var(--red)}.s3{color:var(--orange)}.s4{color:var(--pink)}.s5{color:var(--purple)}.s6{color:var(--green)}
.sl{font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:.3px}
.cr{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:8px;flex:1;min-height:0}
.cp{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px;display:flex;flex-direction:column}
.cp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cp-h h3{font-size:12px;font-weight:600;color:var(--dim);letter-spacing:.3px}
.cp-h .t{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--dim2);background:var(--bg);padding:2px 8px;border-radius:4px}
.cp-b{flex:1;position:relative;min-height:0}
.cp-b canvas{width:100%!important;height:100%!important}
.tr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;height:0;flex:.55;min-height:0}
.tp{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;display:flex;flex-direction:column}
.tp h3{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:8px;letter-spacing:.3px}
.ts{flex:1;overflow-y:auto;min-height:0}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--dim2);font-weight:500;padding:4px 6px;text-align:left;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;position:sticky;top:0;background:var(--card)}
td{font-size:12px;padding:5px 6px;border-bottom:1px solid rgba(30,30,46,.4);font-family:'JetBrains Mono',monospace}
tr:hover td{background:rgba(30,30,46,.3)}
.ti{color:var(--dim2);font-size:10px;width:24px}
.tv{color:var(--cyan)}
.tn{text-align:right;font-weight:600}
.tb{display:inline-block;height:3px;border-radius:2px;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>
<div class="nav"><div class="nav-l"><div class="nav-logo">K</div><div class="nav-t">Kuromi <span>/ Attack Telemetry</span></div></div><div class="nav-r"><div class="nav-b"><span class="nav-dot"></span> Capturing</div><div class="nav-p">:2222</div></div></div>
<div class="app">
<div class="stats" id="statsRow"></div>
<div class="cr">
<div class="cp"><div class="cp-h"><h3>Attack Timeline</h3><span class="t">hourly</span></div><div class="cp-b"><canvas id="c0"></canvas></div></div>
<div class="cp"><div class="cp-h"><h3>Top Usernames</h3><span class="t">credentials</span></div><div class="cp-b"><canvas id="c1"></canvas></div></div>
<div class="cp"><div class="cp-h"><h3>Top Passwords</h3><span class="t">credentials</span></div><div class="cp-b"><canvas id="c2"></canvas></div></div>
</div>
<div class="tr">
<div class="tp"><h3>Attacker IPs</h3><div class="ts"><table><thead><tr><th></th><th>IP</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="t0"></tbody></table></div></div>
<div class="tp"><h3>Usernames</h3><div class="ts"><table><thead><tr><th></th><th>User</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="t1"></tbody></table></div></div>
<div class="tp"><h3>Passwords</h3><div class="ts"><table><thead><tr><th></th><th>Password</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="t2"></tbody></table></div></div>
<div class="tp"><h3>Commands</h3><div class="ts"><table><thead><tr><th></th><th>Command</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="t3"></tbody></table></div></div>
</div>
</div>
<script>
const M=[
{id:"sessions",l:"Sessions",c:"s1"},
{id:"auth_failed",l:"Failed Logins",c:"s2"},
{id:"auth_success",l:"Compromised",c:"s3"},
{id:"commands",l:"Commands",c:"s4"},
{id:"downloads",l:"Downloads",c:"s5"},
{id:"unique_ips",l:"Attackers",c:"s6"},
{id:"unique_usernames",l:"Usernames Tried",c:"s1"},
{id:"auth_rate",l:"Auth Rate",c:"s6",x:"%"}
];
const C={c:"#38bdf8",p:"#ff2d95",u:"#7c3aed"};
function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function anim(e,t,d){if(!e)return;let s=parseInt(e.textContent)||0,o=t-s;if(o===0){e.textContent=t;return}let n=Math.min(Math.abs(o)*2,30),i=0,c=setInterval(()=>{i++;e.textContent=Math.round(s+o*(i/n));if(i>=n){clearInterval(c);e.textContent=t}},d/n)}
function stats(st){let r=document.getElementById("statsRow"),v=M.map(m=>st[m.id]||0);r.innerHTML=M.map((m,i)=>'<div class="stat"><div class="sn '+m.c+'">0'+(m.x||"")+'</div><div class="sl">'+m.l+"</div></div>").join("");requestAnimationFrame(()=>{$$(".sn").forEach((e,i)=>{if(i<v.length)anim(e,v[i]||0,600)})})}
function charts(d){
["c0","c1","c2"].forEach(id=>{let c=document.getElementById(id);if(!c)return;let p=c.parentElement;c.width=p.clientWidth*2;c.height=p.clientHeight*2;c.style.width=p.clientWidth+"px";c.style.height=p.clientHeight+"px"});
let tl=d.timeline||[];
new Chart($("#c0"),{type:"line",data:{labels:tl.map(p=>p.hour),datasets:[{data:tl.map(p=>p.count),borderColor:C.c,backgroundColor:function(ctx){let g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,"rgba(56,189,248,0.12)");g.addColorStop(1,"rgba(56,189,248,0)");return g},borderWidth:1.5,pointRadius:2,fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#16161f",titleFont:{family:"JetBrains Mono",size:11},bodyFont:{family:"JetBrains Mono",size:11},borderColor:"rgba(56,189,248,0.2)",borderWidth:1,padding:8}},scales:{y:{beginAtZero:true,grid:{color:"rgba(30,30,46,.4)"},ticks:{color:"#484868",font:{size:9}}},x:{grid:{display:false},ticks:{color:"#484868",font:{size:8}}}}}});
let u=d.top_usernames||[];
new Chart($("#c1"),{type:"bar",data:{labels:u.map(x=>x.username.length>10?x.username.slice(0,10)+"..":x.username),datasets:[{data:u.map(x=>x.count),backgroundColor:"rgba(255,45,149,0.15)",borderColor:C.p,borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#16161f",titleFont:{family:"JetBrains Mono",size:11},bodyFont:{family:"JetBrains Mono",size:11},borderColor:"rgba(255,45,149,0.2)",borderWidth:1,padding:8}},scales:{y:{beginAtZero:true,grid:{color:"rgba(30,30,46,.4)"},ticks:{color:"#484868",font:{size:9}}},x:{grid:{display:false},ticks:{color:"#484868",font:{size:8}}}}}});
let p=d.top_passwords||[];
new Chart($("#c2"),{type:"bar",data:{labels:p.map(x=>x.password.length>10?x.password.slice(0,10)+"..":x.password),datasets:[{data:p.map(x=>x.count),backgroundColor:"rgba(124,58,237,0.15)",borderColor:C.u,borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#16161f",titleFont:{family:"JetBrains Mono",size:11},bodyFont:{family:"JetBrains Mono",size:11},borderColor:"rgba(124,58,237,0.2)",borderWidth:1,padding:8}},scales:{y:{beginAtZero:true,grid:{color:"rgba(30,30,46,.4)"},ticks:{color:"#484868",font:{size:9}}},x:{grid:{display:false},ticks:{color:"#484868",font:{size:8}}}}}});
}
function tbl(tid,items,lk,ck,clr){let t=document.getElementById(tid);if(!t)return;let mx=items.length>0?Math.max(...items.map(i=>i[ck])):1;t.innerHTML=items.map((x,i)=>{let p=(x[ck]/mx)*100;return '<tr><td class="ti">'+String(i+1).padStart(2,"0")+'</td><td class="tv">'+x[lk]+'</td><td class="tn">'+x[ck]+'<span class="tb" style="width:'+Math.min(p,60)+'px;background:'+clr+'"></span></td></tr>'}).join("")}
let loaded=false;
async function refresh(){try{let r=await fetch("/api/stats"),d=await r.json();if(d.error)return;if(!loaded){stats(d.stats);charts(d);loaded=true}else{let t=[d.stats.sessions,d.stats.auth_failed,d.stats.auth_success,d.stats.commands,d.stats.downloads,d.stats.unique_ips,d.stats.unique_usernames,d.stats.auth_rate];$$(".sn").forEach((e,i)=>{if(i<t.length){let v=t[i]||0;if(parseInt(e.textContent)!==v)anim(e,v,400)}})}tbl("t0",d.top_ips||[],"ip","count","#7c3aed");tbl("t1",d.top_usernames||[],"username","count","#ff2d95");tbl("t2",d.top_passwords||[],"password","count","#38bdf8");tbl("t3",d.top_commands||[],"command","count","#4ade80")}catch(e){console.error(e)}}
refresh();setInterval(refresh,5000);let rt;window.addEventListener("resize",function(){clearTimeout(rt);rt=setTimeout(refresh,500)});
</script>
</body>
</html>
