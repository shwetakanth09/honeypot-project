<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuromi — Attack Telemetry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink: #ff2d95;
            --purple: #7c3aed;
            --cyan: #00d4ff;
            --green: #00ff88;
            --bg: #06060e;
            --card: #0d0d1a;
            --text: #e0e0ff;
            --dim: #5555aa;
            --glow-pink: 0 0 30px rgba(255,45,149,0.15);
            --glow-purple: 0 0 30px rgba(124,58,237,0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===== MATRIX RAIN CANVAS ===== */
        #matrixCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        /* ===== CYBER GRID ===== */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 0;
            pointer-events: none;
            perspective: 600px;
            transform: rotateX(4deg);
            transform-origin: bottom;
        }

        /* ===== SCANLINES ===== */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 3;
        }

        /* ===== AMBIENT GLOW SPOTS ===== */
        .ambient {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .ambient.a1 { width: 600px; height: 600px; top: -200px; left: -200px; background: rgba(255,45,149,0.06); }
        .ambient.a2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: rgba(124,58,237,0.06); }
        .ambient.a3 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,212,255,0.04); }

        /* ===== TOP BAR ===== */
        .topbar {
            position: relative; z-index: 2;
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 36px;
            border-bottom: 1px solid rgba(124,58,237,0.12);
            background: rgba(6,6,14,0.7);
            backdrop-filter: blur(20px);
        }
        .brand {
            display: flex; align-items: center; gap: 18px;
        }
        .logo-box {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(255,45,149,0.15), rgba(124,58,237,0.15));
            border: 1px solid rgba(255,45,149,0.2);
        }
        .logo-box::before {
            content: ''; position: absolute;
            inset: -2px; border-radius: 14px;
            background: conic-gradient(var(--pink), var(--purple), var(--cyan), var(--pink));
            z-index: -1;
            animation: spinBorder 4s linear infinite;
            opacity: 0.5;
        }
        @keyframes spinBorder { to { transform: rotate(360deg); } }
        .logo-box span {
            font-family: 'Orbitron', monospace;
            font-weight: 900; font-size: 20px;
            background: linear-gradient(135deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-block h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 900; font-size: 24px;
            letter-spacing: 4px;
        }
        .title-block h1 .char { display: inline-block; }
        .title-block .sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; letter-spacing: 6px;
            color: var(--dim); text-transform: uppercase;
        }

        .status-panel {
            display: flex; align-items: center; gap: 16px;
        }
        .honeypot-status {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0,255,136,0.15);
            background: rgba(0,255,136,0.03);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: var(--green);
            letter-spacing: 1px;
            position: relative;
        }
        .honeypot-status .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%,100% { box-shadow: 0 0 6px var(--green); opacity: 1; }
            50% { box-shadow: 0 0 20px var(--green); opacity: 0.7; }
        }
        .honeypot-status .pulse-ring {
            position: absolute;
            inset: -3px; border-radius: 22px;
            border: 1px solid rgba(0,255,136,0.15);
            animation: pulseRing 2s ease-out infinite;
        }
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .port-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: var(--dim);
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(124,58,237,0.08);
            border: 1px solid rgba(124,58,237,0.12);
        }

        /* ===== MAIN LAYOUT ===== */
        .main {
            position: relative; z-index: 1;
            padding: 24px 36px 0;
            max-width: 1600px; margin: 0 auto;
            height: calc(100vh - 82px);
            display: flex; flex-direction: column;
            gap: 16px;
        }

        /* ===== TOP STATS ROW ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
        }
        .stat-pill {
            background: rgba(13,13,26,0.7);
            border: 1px solid rgba(124,58,237,0.08);
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-pill:hover {
            border-color: rgba(255,45,149,0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,45,149,0.08);
        }
        .stat-pill .num {
            font-family: 'Orbitron', monospace;
            font-weight: 700; font-size: 22px;
            line-height: 1;
            margin-bottom: 3px;
            transition: all 0.3s;
        }
        .stat-pill .num.pink { color: var(--pink); }
        .stat-pill .num.purple { color: var(--purple); }
        .stat-pill .num.cyan { color: var(--cyan); }
        .stat-pill .num.green { color: var(--green); }
        .stat-pill .num.orange { color: #ff8800; }
        .stat-pill .num.red { color: #ff4444; }
        .stat-pill .lbl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; color: var(--dim);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .stat-pill .glow-bar {
            position: absolute;
            bottom: 0; left: 0; height: 2px;
            border-radius: 0 0 12px 12px;
            transition: width 0.6s ease;
            opacity: 0.6;
        }

        /* ===== CHARTS AREA ===== */
        .charts-area {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1fr;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }
        .chart-panel {
            background: rgba(13,13,26,0.5);
            border: 1px solid rgba(124,58,237,0.06);
            border-radius: 14px;
            padding: 16px;
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
        }
        .chart-panel .panel-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .chart-panel .panel-head h3 {
            font-family: 'Orbitron', monospace;
            font-size: 11px; color: var(--dim);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .chart-panel .panel-head .live-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }
        .chart-panel .chart-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        .chart-panel .chart-wrap canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* ===== TABLES AREA ===== */
        .tables-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            height: 0;
            flex: 0.65;
            min-height: 0;
        }
        .table-panel {
            background: rgba(13,13,26,0.5);
            border: 1px solid rgba(124,58,237,0.06);
            border-radius: 14px;
            padding: 12px 14px;
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .table-panel h3 {
            font-family: 'Orbitron', monospace;
            font-size: 10px; color: var(--dim);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 8px;
        }
        .table-panel .scroll-wrap {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        .table-panel .scroll-wrap::-webkit-scrollbar { width: 3px; }
        .table-panel .scroll-wrap::-webkit-scrollbar-track { background: transparent; }
        .table-panel .scroll-wrap::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 2px; }

        .mini-table { width: 100%; border-collapse: collapse; }
        .mini-table th {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px; color: rgba(85,85,170,0.5);
            text-transform: uppercase; letter-spacing: 1px;
            padding: 4px 6px; text-align: left;
            border-bottom: 1px solid rgba(124,58,237,0.05);
            position: sticky; top: 0;
            background: rgba(13,13,26,0.95);
        }
        .mini-table td {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 5px 6px;
            border-bottom: 1px solid rgba(124,58,237,0.03);
        }
        .mini-table tr:hover td { background: rgba(124,58,237,0.04); }
        .mini-table .idx { color: var(--dim); font-size: 9px; width: 22px; }
        .mini-table .val { color: var(--cyan); }
        .mini-table .count { text-align: right; font-family: 'Orbitron', monospace; font-size: 12px; min-width: 28px; }
        .mini-table .bar-bg {
            display: inline-block;
            height: 3px; border-radius: 2px;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ===== SCROLLBAR GLOBAL ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.2); border-radius: 2px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1100px) {
            .stats-row { grid-template-columns: repeat(4, 1fr); }
            .charts-area { grid-template-columns: 1fr 1fr; }
            .tables-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 700px) {
            .topbar { flex-direction: column; gap: 10px; padding: 12px 16px; }
            .main { padding: 12px 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .charts-area { grid-template-columns: 1fr; }
            .tables-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Matrix Rain -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Background Effects -->
    <div class="cyber-grid"></div>
    <div class="ambient a1"></div>
    <div class="ambient a2"></div>
    <div class="ambient a3"></div>
    <div class="scanlines"></div>

    <!-- ===== TOPBAR ===== -->
    <div class="topbar">
        <div class="brand">
            <div class="logo-box"><span>K</span></div>
            <div class="title-block">
                <h1 id="title"></h1>
                <div class="sub">Attack Telemetry System</div>
            </div>
        </div>
        <div class="status-panel">
            <div class="honeypot-status">
                <span class="pulse-ring"></span>
                <span class="dot"></span> LIVE
            </div>
            <div class="port-badge">SSH :2222</div>
        </div>
    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">

        <!-- Stats Row -->
        <div class="stats-row" id="statsRow"></div>

        <!-- Charts -->
        <div class="charts-area">
            <div class="chart-panel">
                <div class="panel-head">
                    <h3>Attack Timeline</h3>
                    <span class="live-dot" style="background:var(--cyan)"></span>
                </div>
                <div class="chart-wrap"><canvas id="chartTimeline"></canvas></div>
            </div>
            <div class="chart-panel">
                <div class="panel-head">
                    <h3>Top Usernames</h3>
                    <span class="live-dot" style="background:var(--pink)"></span>
                </div>
                <div class="chart-wrap"><canvas id="chartUsers"></canvas></div>
            </div>
            <div class="chart-panel">
                <div class="panel-head">
                    <h3>Top Passwords</h3>
                    <span class="live-dot" style="background:var(--purple)"></span>
                </div>
                <div class="chart-wrap"><canvas id="chartPasswords"></canvas></div>
            </div>
        </div>

        <!-- Tables -->
        <div class="tables-row">
            <div class="table-panel">
                <h3>Attacker IPs</h3>
                <div class="scroll-wrap"><table class="mini-table"><thead><tr><th></th><th>IP</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="tbodyIP"></tbody></table></div>
            </div>
            <div class="table-panel">
                <h3>Usernames</h3>
                <div class="scroll-wrap"><table class="mini-table"><thead><tr><th></th><th>User</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="tbodyUsers"></tbody></table></div>
            </div>
            <div class="table-panel">
                <h3>Passwords</h3>
                <div class="scroll-wrap"><table class="mini-table"><thead><tr><th></th><th>Password</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="tbodyPasswords"></tbody></table></div>
            </div>
            <div class="table-panel">
                <h3>Commands</h3>
                <div class="scroll-wrap"><table class="mini-table"><thead><tr><th></th><th>Command</th><th style="text-align:right">Cnt</th></tr></thead><tbody id="tbodyCommands"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    //  1. MATRIX RAIN
    // ============================================================
    const mc = document.getElementById('matrixCanvas');
    const mctx = mc.getContext('2d');
    let mW, mH, drops, fontSize = 14;
    function resizeMatrix() {
        mW = mc.width = window.innerWidth;
        mH = mc.height = window.innerHeight;
        const cols = Math.floor(mW / fontSize);
        drops = Array(cols).fill(1);
    }
    resizeMatrix();
    window.addEventListener('resize', resizeMatrix);

    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
    function drawMatrix() {
        mctx.fillStyle = 'rgba(6,6,14,0.05)';
        mctx.fillRect(0, 0, mW, mH);
        mctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            const c = chars[Math.floor(Math.random() * chars.length)];
            const x = i * fontSize;
            const y = drops[i] * fontSize;
            // Gradient from pink to purple
            const grad = mctx.createLinearGradient(x, y - 20, x, y + 20);
            grad.addColorStop(0, 'rgba(255,45,149,0)');
            grad.addColorStop(0.5, 'rgba(255,45,149,0.3)');
            grad.addColorStop(1, 'rgba(124,58,237,0)');
            mctx.fillStyle = grad;
            mctx.fillText(c, x, y);
            if (y > mH && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
        requestAnimationFrame(drawMatrix);
    }
    drawMatrix();

    // ============================================================
    //  2. TYPEWRITER TITLE
    // ============================================================
    (function typewriter() {
        const el = document.getElementById('title');
        const text = 'KUROMI';
        let i = 0;
        el.innerHTML = '';
        function tick() {
            if (i < text.length) {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = text[i];
                const colors = ['#ff2d95','#7c3aed','#00d4ff','#00ff88','#ff2d95','#7c3aed'];
                span.style.background = 'linear-gradient(135deg,' + colors.slice(i,i+2).join(',') + ')';
                span.style.webkitBackgroundClip = 'text';
                span.style.webkitTextFillColor = 'transparent';
                span.style.backgroundClip = 'text';
                el.appendChild(span);
                i++;
                setTimeout(tick, 120);
            }
        }
        tick();
    })();

    // ============================================================
    //  3. ANIMATE NUMBER
    // ============================================================
    function animateNum(el, target, duration) {
        if (!el) return;
        const start = parseInt(el.textContent) || 0;
        const diff = target - start;
        if (diff === 0) { el.textContent = target; return; }
        const steps = 20;
        let step = 0;
        const interval = setInterval(() => {
            step++;
            const val = Math.round(start + (diff * (step / steps)));
            el.textContent = val + (el.dataset.suffix || '');
            if (step >= steps) { clearInterval(interval); el.textContent = target + (el.dataset.suffix || ''); }
        }, 30);
    }

    // ============================================================
    //  4. BUILD STATS
    // ============================================================
    function buildStats(stats) {
        const row = document.getElementById('statsRow');
        const items = [
            { key: 'sessions', label: 'Sessions', color: 'cyan', glow: '#00d4ff' },
            { key: 'auth_failed', label: 'Failed Logins', color: 'red', glow: '#ff4444' },
            { key: 'auth_success', label: 'Compromised', color: 'orange', glow: '#ff8800' },
            { key: 'commands', label: 'Commands', color: 'pink', glow: '#ff2d95' },
            { key: 'downloads', label: 'Downloads', color: 'purple', glow: '#7c3aed' },
            { key: 'unique_ips', label: 'Attackers', color: 'purple', glow: '#7c3aed' },
            { key: 'unique_usernames', label: 'Usernames', color: 'cyan', glow: '#00d4ff' },
            { key: 'auth_rate', label: 'Auth Rate', color: 'green', glow: '#00ff88', suffix: '%' },
        ];
        const maxVal = Math.max(...items.map(i => stats[i.key] || 0), 1);
        row.innerHTML = items.map(item => {
            const val = stats[item.key] || 0;
            const pct = (val / maxVal) * 100;
            return `<div class="stat-pill">
                <div class="num ${item.color}" data-target="${val}" data-suffix="${item.suffix||''}">0${item.suffix||''}</div>
                <div class="lbl">${item.label}</div>
                <div class="glow-bar" style="width:${pct}%;background:${item.glow}"></div>
            </div>`;
        }).join('');

        // Animate numbers
        requestAnimationFrame(() => {
            document.querySelectorAll('.stat-pill .num').forEach((el, i) => {
                const target = parseInt(el.dataset.target);
                animateNum(el, target, 600);
            });
        });
    }

    // ============================================================
    //  5. CHARTS
    // ============================================================
    function makeChart(id, type, labels, values, color) {
        const canvas = document.getElementById(id);
        if (!canvas) return null;
        const ctx = canvas.getContext('2d');
        const parent = canvas.parentElement;
        canvas.width = parent.clientWidth * 2;
        canvas.height = parent.clientHeight * 2;
        canvas.style.width = parent.clientWidth + 'px';
        canvas.style.height = parent.clientHeight + 'px';

        const grad = ctx.createLinearGradient(0, 0, 0, parent.clientHeight * 2);
        grad.addColorStop(0, color + '50');
        grad.addColorStop(1, color + '02');

        return new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: '',
                    data: values,
                    backgroundColor: type === 'line' ? grad : color + '25',
                    borderColor: color,
                    borderWidth: type === 'line' ? 2 : 1,
                    pointBorderColor: color,
                    pointBackgroundColor: color + '99',
                    pointRadius: type === 'line' ? 2.5 : 0,
                    pointHoverRadius: 5,
                    fill: type === 'line',
                    borderRadius: 3,
                    tension: 0.3,
                }]
            },
            options: {
                animation: { duration: 400 },
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: true, backgroundColor: 'rgba(13,13,26,0.9)', titleFont: { family: 'JetBrains Mono', size: 11 }, bodyFont: { family: 'JetBrains Mono', size: 11 }, borderColor: color, borderWidth: 1 } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(124,58,237,0.05)' }, ticks: { color: '#5555aa', font: { family: 'JetBrains Mono', size: 9 }, maxTicksLimit: 5 } },
                    x: { grid: { display: false }, ticks: { color: '#5555aa', font: { family: 'JetBrains Mono', size: 8 }, maxTicksLimit: 8 } }
                }
            }
        });
    }

    // ============================================================
    //  6. TABLES
    // ============================================================
    function fillTable(tbody, items, labelKey, countKey, color) {
        if (!tbody) return;
        const maxC = items.length > 0 ? Math.max(...items.map(i => i[countKey])) : 1;
        tbody.innerHTML = items.map((item, i) => {
            const pct = (item[countKey] / maxC) * 100;
            return `<tr>
                <td class="idx">${String(i+1).padStart(2,'0')}</td>
                <td class="val">${item[labelKey]}</td>
                <td class="count">${item[countKey]} <span class="bar-bg" style="width:${Math.min(pct,60)}px;background:${color}"></span></td>
            </tr>`;
        }).join('');
    }

    // ============================================================
    //  7. REFRESH
    // ============================================================
    let charts = {};

    async function refresh() {
        try {
            const resp = await fetch('/api/stats');
            const data = await resp.json();
            if (data.error) return;

            const s = data.stats;

            // Stats
            if (!document.getElementById('statsRow').children.length) buildStats(s);
            else {
                document.querySelectorAll('.stat-pill .num').forEach((el, i) => {
                    const targets = [s.sessions, s.auth_failed, s.auth_success, s.commands, s.downloads, s.unique_ips, s.unique_usernames, s.auth_rate];
                    const suffix = el.dataset.suffix || '';
                    if (i < targets.length && parseInt(el.textContent) !== targets[i]) {
                        el.dataset.target = targets[i];
                        animateNum(el, targets[i], 400);
                    }
                });
                // Update glow bars
                const vals = [s.sessions, s.auth_failed, s.auth_success, s.commands, s.downloads, s.unique_ips, s.unique_usernames, s.auth_rate];
                const maxV = Math.max(...vals, 1);
                document.querySelectorAll('.stat-pill .glow-bar').forEach((bar, i) => {
                    bar.style.width = (vals[i] / maxV * 100) + '%';
                });
            }

            // Charts
            if (charts.timeline) charts.timeline.destroy();
            if (charts.users) charts.users.destroy();
            if (charts.passwords) charts.passwords.destroy();

            const tl = data.timeline || [];
            charts.timeline = makeChart('chartTimeline', 'line', tl.map(p => p.hour), tl.map(p => p.count), '#00d4ff');
            const users = data.top_usernames || [];
            charts.users = makeChart('chartUsers', 'bar', users.map(u => u.username.length > 10 ? u.username.slice(0,10)+'..' : u.username), users.map(u => u.count), '#ff2d95');
            const pwds = data.top_passwords || [];
            charts.passwords = makeChart('chartPasswords', 'bar', pwds.map(p => p.password.length > 10 ? p.password.slice(0,10)+'..' : p.password), pwds.map(p => p.count), '#7c3aed');

            // Tables
            fillTable(document.getElementById('tbodyIP'), data.top_ips || [], 'ip', 'count', '#7c3aed');
            fillTable(document.getElementById('tbodyUsers'), data.top_usernames || [], 'username', 'count', '#ff2d95');
            fillTable(document.getElementById('tbodyPasswords'), data.top_passwords || [], 'password', 'count', '#00d4ff');
            fillTable(document.getElementById('tbodyCommands'), data.top_commands || [], 'command', 'count', '#00ff88');

        } catch(e) { console.error('refresh error', e); }
    }

    // ============================================================
    //  8. INIT
    // ============================================================
    refresh();
    setInterval(refresh, 5000);

    // Handle resize for charts
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(refresh, 500);
    });
    </script>
</body>
</html>
